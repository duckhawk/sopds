{% extends "sopds_main.html" %}
{% load i18n %}
{% load static %}
{% block body %}
<script>
	var BookID = {{ book_id }};
	var delay = 1000;
	var timeout = null;
	
	var waitForLoad = function(){
		if (typeof jQuery != "undefined") {
			LoadBook();
			$(window).bind('scroll',function(){
				clearTimeout(timeout);
				timeout = setTimeout(function(){
					SetPos();
				},delay);
			});
		} else {
			window.setTimeout(waitForLoad, 500);
		}
	};
	window.setTimeout(waitForLoad, 500);  
	
	var ChangeBookDate = function(ID){
		
	}
	
	var SetPos = function(){
		var Reader = $('#ReaderBlock');
		xPos = window.scrollY;
		Reader.find('div[id]').each(function(idx,el){
			var elem = $(el);
			if ((elem.offset().top+elem.height()) > xPos) {
				var CurrentPos = $(el).attr('id');
				$.ajax( {
					url: '{% url 'web:setpos' book_id %}?pos='+CurrentPos,
					type: 'GET',
					cache: false
				});	
				return false;
			};
		})	
	}
	
	var GetPos = function(){
		$.ajax( {
			url: '{% url 'web:getpos' book_id %}',
			type: 'GET',
			cache: false,
			success: function(lineID) {
				if (!lineID) return;
				var Reader = $('#ReaderBlock');
				Reader.find('div[id]').each(function(idx,el){
					if ($(el).attr('id') == lineID) {
						window.scrollTo(0,$(el).offset().top);
					};
				})
			}
		});		
	}

	LoadBook = function(){
		if (localStorage.getItem(BookID)){
			$("#ReaderBlock").html(LZString.decompress(localStorage.getItem(BookID)));
			GetPos();
		} else {
			$.ajax( {
				url: '{% url 'opds_catalog:read' book_id %}',
				type: 'GET',
				cache: true,
				success: function(html) {
					$("#ReaderBlock").html(html);
					
					var StoreDates = {};
					if (localStorage.getItem('StoreDates')) {
						StoreDates = JSON.parse(localStorage.getItem('StoreDates'));
					}
					StoreDates[BookID] = Date();
					
					var CompressedBook = LZString.compress(html);
					
					var StoreBook = function(){
						try {
							localStorage.setItem(BookID,CompressedBook);
							localStorage.setItem('StoreDates',JSON.stringify(StoreDates));
							$('#DownloadBook').hide();
						} catch (err) {
							var Old = Date();
							var OldBookID;
							$.each(StoreDates,function(idx,el){
								if (Old > el) {
									Old = el;
									OldBookID = idx;
								}
							})
							localStorage.removeItem(OldBookID);
							delete StoreDates[OldBookID];
							StoreBook();
						}
					}
					StoreBook();
					
					GetPos();
				}
			});	
		}
	}
	// --- Moon+ Reader .po interoperability (reading position by percentage) ---
	// Moon+ Reader stores a per-book position file "<book>.po" with the format
	//   <timestamp_ms>*<chapter>@<volume>#<char_offset>:<percent>%
	// Only the percentage is portable between apps (chapter/char_offset use Moon
	// Reader's own parsing). Moon Reader's percentage counts TEXT characters, not
	// pixels, so we map on cumulative paragraph text length - mapping on pixel
	// height lands in the wrong place because of images and the page chrome.

	var paragraphs = function(){ return $('#ReaderBlock div[id]').toArray(); };

	var charLen = function(el){ return (el.textContent || '').length; };

	var totalChars = function(divs){
		var t = 0;
		for (var i = 0; i < divs.length; i++) t += charLen(divs[i]);
		return t;
	};

	// Percentage of the book (by text characters) at the current scroll offset.
	var currentPercent = function(){
		var divs = paragraphs();
		var total = totalChars(divs);
		if (!total) return 0;
		var xPos = window.scrollY, before = 0;
		for (var i = 0; i < divs.length; i++){
			var $el = $(divs[i]);
			if (($el.offset().top + $el.height()) > xPos) break;  // first visible paragraph
			before += charLen(divs[i]);
		}
		return Math.min(100, Math.max(0, before / total * 100));
	};

	// Coarse chapter hint from the first visible paragraph div id ("section.paragraph").
	var currentChapter = function(){
		var xPos = window.scrollY, ch = 0;
		$('#ReaderBlock div[id]').each(function(idx, el){
			var elem = $(el);
			if ((elem.offset().top + elem.height()) > xPos){
				ch = parseInt(($(el).attr('id') || '').split('.')[0], 10) || 0;
				return false;
			}
		});
		return ch;
	};

	var ExportPO = function(){
		var po = Date.now() + '*' + currentChapter() + '@0#0:' + currentPercent().toFixed(1) + '%';
		var blob = new Blob([po], {type: 'text/plain'});
		var a = document.createElement('a');
		a.href = URL.createObjectURL(blob);
		a.download = '{{ book_filename|escapejs }}.po';
		document.body.appendChild(a);
		a.click();
		document.body.removeChild(a);
		URL.revokeObjectURL(a.href);
	};

	var ImportPO = function(input){
		var file = input.files && input.files[0];
		if (!file) return;
		var reader = new FileReader();
		reader.onload = function(e){
			var text = (e.target.result || '').trim();
			var m = text.match(/:([0-9]+(?:\.[0-9]+)?)%\s*$/);   // percentage before trailing %
			if (!m){ alert('{% trans "Could not parse .po (no percentage found)" %}'); return; }
			var pct = parseFloat(m[1]);
			var divs = paragraphs();
			var total = totalChars(divs);
			var target = total * pct / 100;
			var acc = 0, el = divs.length ? divs[divs.length - 1] : null;
			for (var i = 0; i < divs.length; i++){
				acc += charLen(divs[i]);
				if (acc >= target){ el = divs[i]; break; }
			}
			if (el) window.scrollTo(0, $(el).offset().top);
		};
		reader.readAsText(file);
		input.value = '';   // allow re-importing the same file
	};
</script>
<div id="po-sync" style="position:fixed;bottom:0.6rem;right:0.6rem;z-index:1000;text-align:right;">
	<a class="button small" href="#" onclick="ExportPO();return false;" style="margin:0 0 .3rem 0;">{% trans "Save position (.po)" %}</a><br>
	<label class="button small" style="margin:0;cursor:pointer;">{% trans "Load .po" %}<input type="file" accept=".po" onchange="ImportPO(this)" style="display:none;"></label>
</div>
<div id="ReaderBlock"><div id="DownloadBook" style="text-align: center;"><img src="{% static "images/download.gif" %}" style="width: 200px;height: 200px;"></div></div>
{% endblock %}{# body #}
